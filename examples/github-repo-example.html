<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Repo Example</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; }
    .editor-wrapper { height: 500px; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; margin-bottom: 1rem; }
    .note { font-size: 0.9rem; color: #666; }
  </style>
  <script src="../dist/embedacode.standalone.js"></script>
</head>
<body>
  <h1>GitHub Repo Example</h1>
  <p class="note">
    Loads <code>microsoft/TypeScript</code> (branch <code>main</code>) from GitHub and opens
    <code>src/compiler/core.ts</code> first (TypeScript source, not only config files). Browse the tree for any path.
    Needs network access; GitHub API rate limits apply without a token.
    <a href="script-tag-example.html">Full-page demo</a> with the same repo settings.
  </p>

  <div class="editor-wrapper">
    <embeda-code id="github-editor" theme="dark"></embeda-code>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const editor = document.getElementById('github-editor');
      editor.config = {
        repoUrl: 'https://github.com/microsoft/TypeScript',
        branch: 'main',
        defaultFile: 'src/compiler/core.ts'
      };
    });
  </script>
</body>
</html>
