<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Remote URL Test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; }
    .editor-wrapper { height: 450px; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
  </style>
  <script src="/dist/embedacode.standalone.js"></script>
</head>
<body>
  <h1>Remote URL Test</h1>
  <div class="editor-wrapper">
    <embeda-code id="remote-editor"></embeda-code>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const editor = document.getElementById('remote-editor');
      editor.config = {
        files: [
          {
            path: 'package.json',
            content: 'https://raw.githubusercontent.com/microsoft/TypeScript/main/package.json',
            language: 'json',
            description: 'Loaded from remote URL'
          }
        ]
      };
    });
  </script>
</body>
</html>
