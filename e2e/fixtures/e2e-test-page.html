<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Test Page - Embeda Code</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; background: #f5f5f5; }
    .editor-wrapper { height: 450px; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
  </style>
  <script src="/dist/embedacode.standalone.js"></script>
</head>
<body>
  <h1>E2E Test Page</h1>
  <div class="editor-wrapper">
    <embeda-code id="e2e-editor" theme="dark"></embeda-code>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const editor = document.getElementById('e2e-editor');
      editor.config = {
        files: [
          {
            path: 'src/index.ts',
            content: 'export { EmbedaCode } from "./editor/embeda-code";\n',
            language: 'typescript',
            description: 'Entry point; re-exports the web component.'
          },
          {
            path: 'src/example.js',
            content: 'function hello() { return "world"; }\n',
            language: 'javascript'
          },
          {
            path: 'README.md',
            content: '# Project\n\nUsage: add the script tag and set config.\n',
            language: 'markdown'
          }
        ]
      };
    });
  </script>
</body>
</html>
